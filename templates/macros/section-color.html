{% macro block(section) %}
    {% if section.extra.color %}
    {% set color = section.extra.color %}
    {% else %}
    {% set color = "black" %}
    {% endif %}
    <div class="blog_section" style="--color:{{color}}">
        <h2 >{{section.title}}</h2>
        <div id="articles" style="--color:{{color}}">
            {% for page in section.pages  %}
                <a href="{{page.permalink}}">{{page.title}}</a>
            {%endfor%}
        </div>
    </div>
{% endmacro %}
